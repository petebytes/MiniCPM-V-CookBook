# MiniCPM-V & o Cookbook — site navigation
#
# Consumed by docs/build_docs.py to produce docs/site/{en,zh}.
#
# Each entry can have:
#   title:    {en, zh}  — display name in the sidebar
#   src:      relative path to the English markdown source (from repo root).
#             Chinese auto-detected as the same path with `_zh.md` suffix
#             (or override with `src_zh`).
#   url:      slug under the version root, e.g. "deployment/vllm"
#             produces /<version>/deployment/vllm.html
#
# Groups are simple labelled containers; they only affect the sidebar grouping.

site:
  title:
    en: "MiniCPM-V & o Cookbook"
    zh: "MiniCPM-V & o 食谱"
  tagline:
    en: "Recipes for vision, speech, and live-streaming multimodal AI."
    zh: "视觉 / 语音 / 实时流多模态 AI 的实战手册。"
  repo: "https://github.com/OpenSQZ/MiniCPM-V-CookBook"
  base_url: "/MiniCPM-V-CookBook"
  default_version: v4.6
  default_lang: en
  brand:
    primary: "#3680ff"        # MiniCPM blue
    accent:  "#1AC8DB"        # OpenBMB cyan
  links:
    - { label: { en: "GitHub",      zh: "GitHub" },     url: "https://github.com/OpenSQZ/MiniCPM-V-CookBook" }
    - { label: { en: "HuggingFace", zh: "HuggingFace" }, url: "https://huggingface.co/openbmb" }
    - { label: { en: "ModelScope",  zh: "魔搭社区" },     url: "https://modelscope.cn/organization/OpenBMB" }
    - { label: { en: "Discord",     zh: "Discord" },    url: "https://discord.gg/rftuRMbqzf" }
    - { label: { en: "Paper",       zh: "技术报告" },     url: "https://huggingface.co/papers/2509.18154" }

# Top-level pages (no version prefix). Accessible from all version sidebars.
top_level:
  - title: { en: "Home",                 zh: "首页"        }
    src:    docs/pages/index.md
    url:    index
  - title: { en: "Framework Matrix",     zh: "框架支持矩阵" }
    src:    docs/pages/framework_matrix.md
    url:    framework-matrix

versions:
  - id: v4.6
    label: { en: "MiniCPM-V 4.6",  zh: "MiniCPM-V 4.6" }
